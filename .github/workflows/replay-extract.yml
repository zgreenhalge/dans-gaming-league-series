# Action A — replay-extract (issue #121)
#
# demo (R2) → replay.json (R2 `<matchId>/replay.json`). Heavy full-tick parsing runs
# here, NOT on Vercel. Triggered by the app via repository_dispatch (type
# `replay-extract`) after a demo is uploaded/parsed, or manually via the Actions UI.
#
# Idempotent: deterministic R2 key, re-dispatch overwrites. The script updates
# `background_jobs` + `matches.replay_status` so the app shows progress without
# opening Actions.

name: replay-extract

on:
  workflow_dispatch:
    inputs:
      match_id:
        description: Match ID to build a replay for
        required: true
        type: string
  repository_dispatch:
    types: [replay-extract]

# Backstop against duplicate in-flight jobs for the same match (the dispatch
# endpoint is the primary guard).
concurrency:
  group: replay-extract-${{ github.event.inputs.match_id || github.event.client_payload.match_id }}
  # Queue a backstop run behind an in-flight one rather than cancelling it: a
  # cancelled run never reaches the script's fail() handler, so it would orphan
  # background_jobs.status at 'running' (and the dispatch guard then blocks retries).
  # The second run is idempotent (deterministic R2 key) and overwrites cleanly.
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MATCH_ID: ${{ github.event.inputs.match_id || github.event.client_payload.match_id }}
      GH_RUN_ID: ${{ github.run_id }}
      GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          # Node 22+ for native WebSocket — @supabase/supabase-js eagerly constructs a
          # Realtime client at createClient() and throws on Node 20 without it.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build replay.json
        run: npx tsx scripts/replay-extract.ts
