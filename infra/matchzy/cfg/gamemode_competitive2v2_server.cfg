// Make sure that warmup lasts until everyone is ready
mp_warmup_pausetimer 1
mp_warmuptime_all_players_connected 0
sv_warmup_to_freezetime_delay 30

// "Extended" wingman
mp_maxrounds 24

// Overtime: 2 round halves until someone wins 3 of 4 rounds
mp_overtime_enable 1
mp_overtime_limit 0
mp_overtime_maxrounds 4

// "Fun" settings
mp_autokick 0
mp_friendlyfire 1
mp_drop_knife_enable 1